# PR/main checks: format, analyze, test, and a full Android release build to
# prove the whole Rust/rinf/database chain. Builds inside the Nix devshell so
# CI uses exactly the toolchain pinned by flake.lock.
name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# The haqor-core ref to build against defaults to main; set the repository
# variable HAQOR_CORE_REF (Settings -> Secrets and variables -> Actions ->
# Variables) to track a haqor-core branch temporarily, and delete the
# variable once it is merged.
jobs:
  databases:
    uses: ./.github/workflows/databases.yml
    with:
      core-ref: ${{ vars.HAQOR_CORE_REF || 'main' }}

  checks:
    name: Analyze, test, build
    needs: databases
    runs-on: ubuntu-latest
    steps:
      - name: Checkout haqor
        uses: actions/checkout@v4
        with:
          path: haqor
      - name: Checkout haqor-core (Rust path dependency)
        uses: actions/checkout@v4
        with:
          repository: machshev/haqor-core
          ref: ${{ vars.HAQOR_CORE_REF || 'main' }}
          path: haqor-core
      - uses: ./haqor/.github/actions/setup-nix-build
        with:
          rust-targets: aarch64-linux-android armv7-linux-androideabi x86_64-linux-android

      - name: Verify formatting
        working-directory: haqor
        # lib/src/bindings is rinf-generated; only check hand-written code.
        run: |
          nix develop --command bash -c \
            "find lib test -name '*.dart' -not -path 'lib/src/bindings/*' -print0 \
             | xargs -0 dart format --set-exit-if-changed"

      - name: Analyze project source
        working-directory: haqor
        run: nix develop --command flutter analyze

      - name: Run tests
        working-directory: haqor
        run: nix develop --command flutter test

      - name: Build Android APK
        working-directory: haqor
        run: nix develop --command flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: haqor/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
