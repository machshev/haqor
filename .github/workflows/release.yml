# Builds release binaries for every platform and attaches them to a GitHub
# Release when a v* tag is pushed.
#
# Signing status without paid developer accounts:
#   Android — signed with the required release keystore secrets (see
#             doc/RELEASING.md). A tagged release fails when they are absent;
#             non-publishing validation runs use debug signing.
#   Windows — unsigned: SmartScreen warns on first run.
#   macOS   — ad-hoc signed, not notarized: right-click -> Open on first run.
#   iOS     — unsigned IPA for sideloading (AltStore/Sideloadly). TestFlight /
#             App Store distribution needs an Apple Developer account.
#
# Linux-hosted jobs (databases, Android) build inside the Nix devshell so the
# toolchain is pinned by flake.lock. Windows/macOS/iOS cannot use the
# devshell, and the Linux desktop release is deliberately built outside it —
# see the comments on those jobs.
name: Release

on:
  push:
    tags: ["v*"]
  # Exercise every release-critical path on PRs, so a real tag is not the
  # first time a platform packaging or database change is tested.
  pull_request:
    paths:
      - ".github/workflows/release.yml"
      - ".github/workflows/databases.yml"
      - ".github/actions/**"
      - "android/app/build.gradle.kts"
      - "native/hub/**"
      - "Cargo.lock"
      - "pubspec.yaml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  preflight:
    name: Validate release version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: version
        name: Check tag and app version agree
        shell: bash
        run: |
          set -euo pipefail
          app_version="$(sed -nE 's/^version: ([^+[:space:]]+).*/\1/p' pubspec.yaml)"
          test -n "$app_version"
          if [[ "$GITHUB_REF" == refs/tags/* ]] && [[ "$GITHUB_REF_NAME" != "v$app_version" ]]; then
            echo "::error::Tag $GITHUB_REF_NAME must match pubspec.yaml version v$app_version"
            exit 1
          fi
          echo "version=$app_version" >> "$GITHUB_OUTPUT"

  databases:
    needs: preflight
    uses: ./.github/workflows/databases.yml

  android:
    name: Android
    needs: [preflight, databases]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout haqor
        uses: actions/checkout@v4
        with:
          path: haqor
      - uses: ./haqor/.github/actions/setup-nix-build
        with:
          rust-targets: aarch64-linux-android armv7-linux-androideabi x86_64-linux-android
      - name: Configure release signing
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: haqor
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          test -n "$KEYSTORE_BASE64" || { echo "::error::ANDROID_KEYSTORE_BASE64 is required for tagged releases"; exit 1; }
          test -n "$KEYSTORE_PASSWORD" || { echo "::error::ANDROID_KEYSTORE_PASSWORD is required for tagged releases"; exit 1; }
          test -n "$KEY_ALIAS" || { echo "::error::ANDROID_KEY_ALIAS is required for tagged releases"; exit 1; }
          test -n "$KEY_PASSWORD" || { echo "::error::ANDROID_KEY_PASSWORD is required for tagged releases"; exit 1; }
          echo "$KEYSTORE_BASE64" | base64 -d > android/keystore.jks
          {
            echo "storeFile=keystore.jks"
            echo "storePassword=$KEYSTORE_PASSWORD"
            echo "keyAlias=$KEY_ALIAS"
            echo "keyPassword=$KEY_PASSWORD"
          } > android/key.properties
      - name: Build APKs
        working-directory: haqor
        run: |
          nix develop --command flutter build apk --release
          nix develop --command flutter build apk --release --split-per-abi
      - name: Collect binaries
        working-directory: haqor
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk dist/haqor-android.apk
          for abi in arm64-v8a armeabi-v7a x86_64; do
            cp "build/app/outputs/flutter-apk/app-$abi-release.apk" "dist/haqor-android-$abi.apk"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: binaries-android
          path: haqor/dist/*
          if-no-files-found: error

  linux:
    name: Linux
    needs: [preflight, databases]
    # Deliberately built OUTSIDE the Nix devshell: binaries linked in the
    # devshell carry /nix/store interpreter/rpath entries and only run on Nix
    # systems. The oldest supported runner gives the widest glibc
    # compatibility for the portable tarball.
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout haqor
        uses: actions/checkout@v4
        with:
          path: haqor
      - name: Install Linux desktop build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake git ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev
      - uses: ./haqor/.github/actions/setup-build
      - name: Build Linux bundle
        working-directory: haqor
        run: flutter build linux --release
      - name: Collect binaries
        working-directory: haqor
        run: |
          mkdir -p dist
          tar -czf dist/haqor-linux-x64.tar.gz -C build/linux/x64/release/bundle .
      - uses: actions/upload-artifact@v4
        with:
          name: binaries-linux
          path: haqor/dist/*
          if-no-files-found: error

  windows:
    name: Windows
    needs: [preflight, databases]
    runs-on: windows-latest
    steps:
      - name: Checkout haqor
        uses: actions/checkout@v4
        with:
          path: haqor
      - uses: ./haqor/.github/actions/setup-build
      - name: Build Windows bundle
        working-directory: haqor
        run: flutter build windows --release
      - name: Collect binaries
        working-directory: haqor
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath dist\haqor-windows-x64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: binaries-windows
          path: haqor/dist/*
          if-no-files-found: error

  macos:
    name: macOS
    needs: [preflight, databases]
    runs-on: macos-latest
    steps:
      - name: Checkout haqor
        uses: actions/checkout@v4
        with:
          path: haqor
      - uses: ./haqor/.github/actions/setup-build
        with:
          rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
      - name: Build macOS app
        working-directory: haqor
        run: flutter build macos --release
      - name: Package DMG (ad-hoc signed, not notarized)
        working-directory: haqor
        run: |
          APP=build/macos/Build/Products/Release/haqor.app
          codesign --force --deep --sign - "$APP"
          echo "Architectures: $(lipo -archs "$APP/Contents/MacOS/haqor")"
          mkdir -p dist
          hdiutil create -volname Haqor -srcfolder "$APP" -ov -format UDZO dist/haqor-macos-universal.dmg
      - uses: actions/upload-artifact@v4
        with:
          name: binaries-macos
          path: haqor/dist/*
          if-no-files-found: error

  ios:
    name: iOS (unsigned)
    needs: [preflight, databases]
    runs-on: macos-latest
    steps:
      - name: Checkout haqor
        uses: actions/checkout@v4
        with:
          path: haqor
      - uses: ./haqor/.github/actions/setup-build
        with:
          rust-targets: aarch64-apple-ios
      - name: Build iOS app (no code signing)
        working-directory: haqor
        run: flutter build ios --release --no-codesign
      - name: Package unsigned IPA
        working-directory: haqor
        run: |
          mkdir -p dist Payload
          cp -R build/ios/iphoneos/Runner.app Payload/
          zip -qry dist/haqor-ios-unsigned.ipa Payload
      - uses: actions/upload-artifact@v4
        with:
          name: binaries-ios
          path: haqor/dist/*
          if-no-files-found: error

  web:
    name: Web (WASM)
    needs: [preflight, databases]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout haqor
        uses: actions/checkout@v4
        with:
          path: haqor
      - uses: ./haqor/.github/actions/setup-nix-build
        with:
          rust-targets: wasm32-unknown-unknown
      - name: Build offline WASM PWA
        working-directory: haqor
        run: |
          nix develop --command bash -c '
            set -euo pipefail
            ./tool/build-web.sh --wasm --base-href /haqor/
          '
      - name: Package web bundle
        working-directory: haqor
        run: |
          mkdir -p dist
          (
            cd build/web
            zip -qry ../../dist/haqor-web-wasm.zip .
          )
      - uses: actions/upload-artifact@v4
        with:
          name: binaries-web
          path: haqor/dist/*
          if-no-files-found: error
      - name: Upload GitHub Pages artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-pages-artifact@v3
        with:
          path: haqor/build/web

  pages:
    name: Deploy GitHub Pages
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [preflight, web]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  publish:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [preflight, android, linux, windows, macos, ios, web]
    runs-on: ubuntu-latest
    # Configure this environment in GitHub with a required reviewer before
    # cutting the first release; it is the approval boundary for publication.
    environment: release
    permissions:
      contents: write
    steps:
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          pattern: binaries-*
          path: dist
          merge-multiple: true
      - name: Stamp version and generate checksums
        working-directory: dist
        run: |
          version="${{ needs.preflight.outputs.version }}"
          for f in haqor-*; do
            mv "$f" "${f/haqor-/haqor-$version-}"
          done
          sha256sum haqor-* > SHA256SUMS
          ls -la
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            ## Installation

            | Platform | File | Notes |
            |---|---|---|
            | Android | `…-android-arm64-v8a.apk` | Most devices. Enable "install unknown apps", then open the APK. Use `…-android.apk` (universal) if unsure. |
            | Windows | `…-windows-x64.zip` | Unzip and run `haqor.exe`. Unsigned: SmartScreen will warn — "More info" → "Run anyway". |
            | macOS | `…-macos-universal.dmg` | Not notarized: right-click the app → Open the first time, or run `xattr -dr com.apple.quarantine /Applications/haqor.app`. |
            | Linux | `…-linux-x64.tar.gz` | Unpack and run `./haqor`. Requires GTK 3. |
            | iOS | `…-ios-unsigned.ipa` | Unsigned: sideload with AltStore or Sideloadly using a free Apple ID (re-signs every 7 days). |
            | Web | `…-web-wasm.zip` | Unzip and serve over HTTPS, or use the live PWA at https://machshev.github.io/haqor/. |

            `SHA256SUMS` contains checksums for all files.
