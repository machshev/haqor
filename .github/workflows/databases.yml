# Generates the bundled SQLite databases (bible/lexicon/hebrew/sedra) from
# haqor-core's committed source texts. The .db files (~56 MB) are gitignored
# in both repos, so every CI/release build regenerates them here — cached per
# haqor-core commit — and ships them to the platform build jobs as the
# `assets-db` artifact.
#
# Reusable workflow: called by ci.yml and release.yml. Uses haqor-core's Nix
# flake (packages.haqor-cli) so the generator toolchain is pinned by that
# repo's flake.lock + Cargo.lock.
name: Databases

on:
  workflow_call:
    inputs:
      core-ref:
        description: >
          Optional machshev/haqor-core ref override. By default this is derived
          from native/hub/Cargo.toml so generated data matches the app runtime.
        type: string
        required: false
        default: ""

jobs:
  generate:
    name: Generate SQLite databases
    runs-on: ubuntu-latest
    steps:
      - name: Checkout haqor
        uses: actions/checkout@v4
        with:
          path: haqor

      - name: Resolve pinned haqor-core ref
        id: core-ref
        env:
          CORE_REF_OVERRIDE: ${{ inputs.core-ref }}
        run: |
          set -euo pipefail
          core_ref="$CORE_REF_OVERRIDE"
          if [[ -z "$core_ref" ]]; then
            core_version="$(
              sed -nE \
                's/^haqor-core = \{ version = "=([^"]+)".*/\1/p' \
                haqor/native/hub/Cargo.toml
            )"
            test -n "$core_version"
            core_ref="v$core_version"
          fi
          echo "ref=$core_ref" >> "$GITHUB_OUTPUT"
          echo "Generating databases from haqor-core $core_ref"

      - name: Checkout haqor-core
        uses: actions/checkout@v4
        with:
          repository: machshev/haqor-core
          ref: ${{ steps.core-ref.outputs.ref }}
          path: haqor-core
          submodules: recursive

      - name: Resolve haqor-core commit
        id: core
        run: echo "sha=$(git -C haqor-core rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Cache generated databases
        id: db-cache
        uses: actions/cache@v4
        with:
          path: haqor-core/data/*.db
          key: assets-db-v1-${{ steps.core.outputs.sha }}

      - name: Install Nix
        if: steps.db-cache.outputs.cache-hit != 'true'
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ github.token }}

      - name: Cache Nix store
        if: steps.db-cache.outputs.cache-hit != 'true'
        uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-dbgen-${{ runner.os }}-${{ hashFiles('haqor-core/flake.lock', 'haqor-core/Cargo.lock') }}
          restore-prefixes-first-match: nix-dbgen-${{ runner.os }}-

      - name: Cache cargo build
        if: steps.db-cache.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            haqor-core/target
          key: cargo-dbgen-${{ runner.os }}-${{ hashFiles('haqor-core/Cargo.lock') }}

      - name: Add swap space
        if: steps.db-cache.outputs.cache-hit != 'true'
        # gen-hebrew's reverse-parse index peaks at ~19 GB RSS (measured), just
        # over the 16 GB on standard runners — without extra swap the VM's OOM
        # killer takes down the runner agent ("runner received a shutdown
        # signal"). /mnt is the runner's large ephemeral disk.
        run: |
          sudo fallocate -l 16G /mnt/swapfile-dbgen
          sudo chmod 600 /mnt/swapfile-dbgen
          sudo mkswap /mnt/swapfile-dbgen
          sudo swapon /mnt/swapfile-dbgen
          free -h

      - name: Generate databases
        if: steps.db-cache.outputs.cache-hit != 'true'
        working-directory: haqor-core
        env:
          RUST_LOG: info
        # Runs via `cargo run` in the devshell rather than the nix-built
        # binary: gen-lexicon locates data/lexicon_overrides.json through a
        # compile-time CARGO_MANIFEST_DIR path, which in a `nix build` binary
        # points at the vanished build sandbox. `cargo run` from the checkout
        # (as in local dev) resolves it correctly.
        #
        # Order matters: gen-hebrew reads bible.db and lexicon.db. --force
        # wipes any stale hebrew.db so the shipped DB is a clean full build of
        # the current parser (the curated lexicon_overrides.json is committed
        # in haqor-core and baked in by gen-lexicon).
        run: |
          nix develop --command bash -c '
            set -euo pipefail
            cargo run --release -p haqor-cli -- db gen-bible
            cargo run --release -p haqor-cli -- db gen-lexicon
            cargo run --release -p haqor-cli -- db gen-hebrew --force
            cargo run --release -p haqor-cli -- db gen-sedra
          '

      - name: Verify reader gloss data
        working-directory: haqor-core
        run: |
          set -euo pipefail
          reader_gloss_column="$(
            sqlite3 data/hebrew.db \
              "SELECT count(*) FROM pragma_table_info('verse_word') WHERE name = 'reader_gloss';"
          )"
          reader_gloss_rows="$(
            sqlite3 data/hebrew.db \
              "SELECT count(*) FROM verse_word WHERE reader_gloss != '';"
          )"
          test "$reader_gloss_column" -eq 1
          test "$reader_gloss_rows" -gt 0
          echo "Verified $reader_gloss_rows populated reader glosses"

      - name: Upload databases artifact
        uses: actions/upload-artifact@v4
        with:
          name: assets-db
          path: haqor-core/data/*.db
          if-no-files-found: error
