<html>

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Read Biblical Hebrew and build fluency offline.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="haqor">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Haqor</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    (() => {
      const retryParameter = '_haqor_coi_retry';

      function loadFlutter() {
        const script = document.createElement('script');
        script.src = 'flutter_bootstrap.js';
        script.async = true;
        document.body.appendChild(script);
      }

      function removeRetryParameter() {
        const url = new URL(window.location.href);
        if (!url.searchParams.delete(retryParameter)) return;
        window.history.replaceState(null, '', url);
      }

      function reloadForIsolation() {
        const url = new URL(window.location.href);
        if (url.searchParams.has(retryParameter)) {
          // Do not trap the user in a reload loop if a browser blocks service
          // workers. The non-isolated fallback remains usable, but threaded
          // WASM may be unavailable.
          console.error(
            'The Haqor service worker did not establish cross-origin isolation.',
          );
          removeRetryParameter();
          loadFlutter();
          return;
        }
        url.searchParams.set(retryParameter, '1');
        window.location.replace(url);
      }

      async function start() {
        // The service worker is intentionally skipped for Flutter's local
        // development server because its reload breaks the DWDS connection.
        // The query override is used by the release-build browser test.
        const isLocalDevelopment =
          window.location.hostname === 'localhost' ||
          window.location.hostname === '127.0.0.1' ||
          window.location.hostname === '[::1]';
        const testServiceWorker =
          new URLSearchParams(window.location.search).has('test-service-worker');
        if (!('serviceWorker' in navigator) ||
            (isLocalDevelopment && !testServiceWorker)) {
          loadFlutter();
          return;
        }

        const controllerUrl = navigator.serviceWorker.controller?.scriptURL;
        const controller = controllerUrl ? new URL(controllerUrl) : null;
        const unifiedWorkerIsControlling =
          controller?.pathname.endsWith('/flutter_service_worker.js') &&
          controller.search === '';
        if (crossOriginIsolated && unifiedWorkerIsControlling) {
          removeRetryParameter();
          loadFlutter();
          return;
        }

        let reloading = false;
        const reloadOnce = () => {
          if (reloading) return;
          reloading = true;
          reloadForIsolation();
        };
        navigator.serviceWorker.addEventListener(
          'controllerchange',
          reloadOnce,
          {once: true},
        );

        try {
          const registration = await navigator.serviceWorker.register(
            'flutter_service_worker.js',
          );
          registration.waiting?.postMessage('skipWaiting');

          if (unifiedWorkerIsControlling) {
            reloadOnce();
          }
        } catch (error) {
          console.error('Unable to install the Haqor service worker.', error);
          loadFlutter();
        }
      }

      start();
    })();
  </script>
</body>
</html>
